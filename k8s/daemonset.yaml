apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: umrd
  namespace: kube-system
  labels:
    app: umrd
    component: memory-reclaimer
spec:
  selector:
    matchLabels:
      app: umrd
  template:
    metadata:
      labels:
        app: umrd
    spec:
      priorityClassName: system-node-critical
      tolerations:
      - operator: Exists
      hostPID: true
      containers:
      - name: umrd
        image: zpk.idc.w7.com/w7panel/umrd-dev:latest
        imagePullPolicy: IfNotPresent
        command: ["python3", "-m", "umrd"]
        args:
        - "--mode=2"
        - "--swapout-limit=0.6"
        - "--pct-trigger-reclaim=0.6"
        - "--cpu-quota-ratio=0.05"
        - "--reclaim-mode=emm"
        - "--interval-anon=10"
        - "--ratio-anon=0.0002"
        - "--ratio-file=0"
        - "--open-zram"
        - "--quiet"
        env:
        - name: PYTHONUNBUFFERED
          value: "1"
        - name: DISK_SIZE
          value: "0"
        - name: ZRAM_REJECT_SIZE
          value: "-1"
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        volumeMounts:
        - name: cgroup
          mountPath: /sys/fs/cgroup
        - name: kernel-modules
          mountPath: /lib/modules
          readOnly: true
        - name: run
          mountPath: /run/umrd
      volumes:
      - name: cgroup
        hostPath:
          path: /sys/fs/cgroup
      - name: kernel-modules
        hostPath:
          path: /lib/modules
      - name: run
        hostPath:
          path: /run/umrd
